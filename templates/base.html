<!DOCTYPE html>
<html lang="en" id="app-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mail.tm Web Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body id="app-body">
    {% block body %}
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="app-sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <i class="fas fa-paper-plane"></i>
                </div>
                <span class="brand-text">Mail.tm</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="sidebar-link active">
                    <i class="fas fa-inbox"></i>
                    <span>Inbox</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-footer-text">
                    <i class="fas fa-palette"></i> Themes
                </div>
                <div class="theme-switcher">
                    <button class="theme-btn active" data-theme="modern" title="Modern" onclick="setTheme('modern')">
                        <i class="fas fa-sun"></i>
                    </button>
                    <button class="theme-btn" data-theme="dark" title="Dark" onclick="setTheme('dark')">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button class="theme-btn" data-theme="aurora" title="Aurora" onclick="setTheme('aurora')">
                        <i class="fas fa-northern-lights"></i>
                    </button>
                    <button class="theme-btn" data-theme="minimal" title="Minimal" onclick="setTheme('minimal')">
                        <i class="fas fa-minimize"></i>
                    </button>
                </div>
                <div class="sidebar-footer-text" style="margin-top: 12px;">
                    <i class="fas fa-code me-1"></i> by AlejandroSejas
                </div>
            </div>
        </aside>

        <!-- Main content -->
        <main class="app-main">
            <!-- Top bar -->
            <header class="app-topbar">
                <button class="btn-menu d-lg-none" id="menu-toggle" aria-label="Toggle menu">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="topbar-content">
                    {% block topbar %}{% endblock %}
                </div>
            </header>

            <div class="app-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay d-lg-none" id="sidebar-overlay"></div>

    <!-- Toast container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
    // Theme Management
    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('app-html').setAttribute('data-theme', theme);
        localStorage.setItem('mailTmTheme', theme);
        updateThemeButtons(theme);
    }

    function updateThemeButtons(theme) {
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-theme') === theme) {
                btn.classList.add('active');
            }
        });
    }

    // Load saved theme on startup
    document.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('mailTmTheme') || 'modern';
        setTheme(saved);
    });

    // Mobile sidebar toggle
    const menuToggle = document.getElementById('menu-toggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');

    if (menuToggle) {
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        });
    }

    if (overlay) {
        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        });
    }

    // Toast utility
    function showToast(message, type = 'success') {
        const icons = {
            success: 'fa-check-circle',
            error: 'fa-exclamation-circle',
            info: 'fa-info-circle'
        };
        const colors = {
            success: '#10b981',
            error: '#ef4444',
            info: '#6366f1'
        };
        const toast = document.createElement('div');
        toast.className = 'toast align-items-center border-0 show';
        toast.setAttribute('role', 'alert');
        toast.style.cssText = `--toast-color: ${colors[type]}`;
        toast.innerHTML = `
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center gap-2">
                    <i class="fas ${icons[type]}" style="color: ${colors[type]}"></i>
                    ${message}
                </div>
                <button type="button" class="btn-close btn-close-dark me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        `;
        document.getElementById('toast-container').appendChild(toast);
        setTimeout(() => {
            toast.classList.add('toast-fade-out');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
